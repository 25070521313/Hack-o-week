<!DOCTYPE html>
<html>
<head>
<title>Simple Weather Panel</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f4f8;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:200px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.city{
    font-size:22px;
    font-weight:bold;
}

.temp{
    font-size:28px;
    color:#ff6600;
    margin:10px 0;
}

.weather{
    color:#555;
}
</style>

</head>

<body>

<h1>Weather Information Panel</h1>

<div class="container">

<div class="card">
<div class="city">Mumbai</div>
<div class="temp">32°C</div>
<div class="weather">Sunny ☀️</div>
</div>

<div class="card">
<div class="city">Delhi</div>
<div class="temp">28°C</div>
<div class="weather">Cloudy ☁️</div>
</div>

<div class="card">
<div class="city">Nagpur</div>
<div class="temp">34°C</div>
<div class="weather">Hot ☀️</div>
</div>

</div>

</body>
</html>
