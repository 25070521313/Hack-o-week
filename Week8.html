<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

h1{
    margin-top:20px;
}

.gallery{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
    width:70%;
    margin:auto;
    margin-top:20px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    width:60%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:35px;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Photography Gallery</h1>

<div class="gallery">
<img src="https://picsum.photos/id/1011/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1015/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1016/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1020/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1024/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1025/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1035/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1040/400/300" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1050/400/300" onclick="openLightbox(this)">
</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">&times;</span>
<img id="lightbox-img">
</div>

<script>
function openLightbox(img){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=img.src;
}

function closeLightbox(){
    document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
